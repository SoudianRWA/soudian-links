<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soudian Links</title>
    <meta name="description" content="Soudian official links: website, Discord, and Telegram.">
    <meta property="og:title" content="Soudian Links">
    <meta property="og:description" content="Visit Soudian's official website and community channels.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0d1b1e">
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1b1e;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.14);
        --text: #f6fbf8;
        --muted: #a9b8b2;
        --line: rgba(255, 255, 255, 0.18);
        --teal: #58dec1;
        --gold: #f6c766;
        --coral: #ff7a64;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(145deg, rgba(88, 222, 193, 0.08) 0 1px, transparent 1px 100%),
          linear-gradient(145deg, #0d1b1e 0%, #13282a 48%, #231b20 100%);
        background-size: 18px 18px, auto;
        color: var(--text);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(100%, 1120px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 42px 22px 30px;
        display: grid;
        align-items: center;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(320px, 0.78fr);
        gap: 34px;
        align-items: center;
      }

      .brand {
        min-width: 0;
      }

      .mark {
        width: 88px;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        margin-bottom: 28px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background:
          linear-gradient(135deg, rgba(88, 222, 193, 0.9), rgba(246, 199, 102, 0.88)),
          #13282a;
        box-shadow: var(--shadow);
        color: #071214;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.4rem, 11vw, 8.6rem);
        line-height: 0.88;
        letter-spacing: 0;
      }

      .tagline {
        max-width: 580px;
        margin: 26px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.22rem);
        line-height: 1.68;
      }

      .link-panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(8, 18, 20, 0.76);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .link-list {
        display: grid;
        gap: 12px;
      }

      .link-card {
        min-height: 84px;
        display: grid;
        grid-template-columns: 52px 1fr 24px;
        gap: 15px;
        align-items: center;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .link-card:hover,
      .link-card:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(88, 222, 193, 0.62);
        background: var(--panel-strong);
        outline: none;
      }

      .icon {
        width: 52px;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      .official .icon {
        color: var(--teal);
      }

      .discord .icon {
        color: #a8b8ff;
      }

      .telegram .icon {
        color: #6fc7ff;
      }

      .link-title {
        display: block;
        margin-bottom: 4px;
        font-size: 1.02rem;
        font-weight: 760;
      }

      .link-url {
        display: block;
        color: var(--muted);
        font-size: 0.94rem;
        overflow-wrap: anywhere;
      }

      .arrow {
        color: var(--gold);
      }

      .note {
        margin: 16px 2px 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.6;
        text-align: center;
      }

      .footer {
        margin-top: 28px;
        color: rgba(246, 251, 248, 0.58);
        font-size: 0.82rem;
        text-align: center;
      }

      svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      @media (max-width: 780px) {
        .page {
          padding: 30px 16px 24px;
          align-items: start;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 28px;
        }

        .mark {
          width: 72px;
          margin-bottom: 22px;
          border-radius: 18px;
          font-size: 28px;
        }

        h1 {
          font-size: clamp(3.1rem, 18vw, 5.7rem);
        }

        .tagline {
          margin-top: 20px;
        }

        .link-panel {
          padding: 12px;
        }

        .link-card {
          grid-template-columns: 46px 1fr 20px;
          min-height: 78px;
          gap: 12px;
          padding: 14px;
        }

        .icon {
          width: 46px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="Soudian links">
      <section class="shell">
        <div class="brand">
          <div class="mark" aria-hidden="true">S</div>
          <h1>Soudian</h1>
          <p class="tagline">Official access point for Soudian. Follow the website and join the community channels below.</p>
        </div>

        <div>
          <nav class="link-panel" aria-label="Official links">
            <div class="link-list">
              <a class="link-card official" href="https://soudian.ai" target="_blank" rel="noopener noreferrer">
                <span class="icon" aria-hidden="true">

                </span>

                  <span class="link-title">官网</span>

                  <svg viewBox="0 0 24 24"><path d="M7 17 17 7"></path><path d="M7 7h10v10"></path></svg>
                </span>

              <a class="link-card discord" href="https://discord.gg/8Zs2Wcbrc" target="_blank" rel="noopener noreferrer">
                <span class="icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M8 12h.01"></path><path d="M16 12h.01"></path><path d="M7.5 7.8c3-1 6-1 9 0"></path><path d="M7 17c-1.8-.5-3-1.2-3-1.2.3-4.1 1.4-7.1 3.2-9.8 1.6-.7 3.1-1.1 4.8-1.1s3.2.4 4.8 1.1c1.8 2.7 2.9 5.7 3.2 9.8 0 0-1.2.7-3 1.2"></path><path d="M9 16.5c2 .7 4 .7 6 0"></path></svg>
                </span>
                <span>
                  <span class="link-title">Discord</span>
                  <span class="link-url">discord.gg/8Zs2Wcbrc</span>
                </span>
                <span class="arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M7 17 17 7"></path><path d="M7 7h10v10"></path></svg>
                </span>
              </a>

              <a class="link-card telegram" href="https://t.me/SoudianRWA" target="_blank" rel="noopener noreferrer">
                <span class="icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
                </span>
                <span>
                  <span class="link-title">Telegram</span>
                  <span class="link-url">t.me/SoudianRWA</span>
                </span>
                <span class="arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M7 17 17 7"></path><path d="M7 7h10v10"></path></svg>
                </span>
              </a>
            </div>
          </nav>
          <p class="note">Soudian official links only. Please verify the URL before joining any community.</p>
          <p class="footer">© 2026 Soudian</p>
        </div>
      </section>
    </main>
  </body>
</html>
